{% extends "base.html" %}

{% block title %}物体追跡 - MFG Drone 管理者画面{% endblock %}
{% block header_title %}物体追跡{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- 追跡制御 -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">物体追跡制御</h3>
            <p class="card-subtitle">AIによる自動追跡</p>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label">追跡対象</label>
                <select id="target-object" class="form-select">
                    <option value="">対象を選択</option>
                    <option value="person">人物</option>
                    <option value="car">車両</option>
                    <option value="ball">ボール</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">追跡モード</label>
                <select id="tracking-mode" class="form-select">
                    <option value="center">中央維持</option>
                    <option value="follow">追従</option>
                </select>
            </div>
            
            <div class="grid gap-3 mt-4">
                <button id="start-tracking-btn" class="btn btn-success">
                    <i class="fas fa-play"></i>
                    追跡開始
                </button>
                <button id="stop-tracking-btn" class="btn btn-warning" disabled>
                    <i class="fas fa-stop"></i>
                    追跡停止
                </button>
            </div>
        </div>
    </div>
    
    <!-- 追跡状態 -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">追跡状態</h3>
            <p class="card-subtitle">現在の追跡情報</p>
        </div>
        <div class="card-body">
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span>追跡状態:</span>
                    <span id="tracking-status" class="text-muted">停止中</span>
                </div>
                <div class="flex justify-between">
                    <span>検出信頼度:</span>
                    <span id="detection-confidence">--%</span>
                </div>
                <div class="flex justify-between">
                    <span>追跡時間:</span>
                    <span id="tracking-duration">--</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 検出映像 -->
<div class="card mt-6">
    <div class="card-header">
        <h3 class="card-title">検出映像</h3>
        <p class="card-subtitle">AIによる物体検出結果</p>
    </div>
    <div class="card-body">
        <div id="detection-stream" class="bg-gray-100 rounded-lg" style="min-height: 400px; display: flex; align-items: center; justify-content: center;">
            <p class="text-muted">検出映像を読み込み中...</p>
        </div>
    </div>
</div>
{% endblock %}
