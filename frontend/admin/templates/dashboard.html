<div class="page-header">
    <h1 class="page-title">ダッシュボード</h1>
    <p class="page-description">システム全体の状況を監視・管理します</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-value" id="drone-status">未接続</div>
        <div class="stat-label">ドローン状態</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="tracking-mode">停止中</div>
        <div class="stat-label">追跡状態</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="model-count">--</div>
        <div class="stat-label">訓練済みモデル数</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="flight-time">0分</div>
        <div class="stat-label">累積飛行時間</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">クイックアクション</h2>
    </div>
    <div class="flex gap-2">
        <button id="connect-btn" class="btn btn-primary">ドローン接続</button>
        <button id="takeoff-btn" class="btn btn-success">離陸</button>
        <button id="land-btn" class="btn btn-warning">着陸</button>
        <button id="emergency-btn" class="btn btn-danger">緊急停止</button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">ライブ映像</h2>
        <div class="card-actions">
            <button id="start-stream-btn" class="btn btn-success btn-sm">ストリーミング開始</button>
            <button id="stop-stream-btn" class="btn btn-warning btn-sm">ストリーミング停止</button>
        </div>
    </div>
    <div class="video-feed" id="video-feed">
        <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #9ca3af;">
            映像ストリーミング開始前
        </div>
    </div>
</div>
