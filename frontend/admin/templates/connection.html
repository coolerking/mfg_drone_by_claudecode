{% extends "base.html" %}

{% block title %}ドローン接続 - MFG Drone 管理者画面{% endblock %}
{% block header_title %}ドローン接続{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- 接続制御 -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">接続制御</h3>
            <p class="card-subtitle">ドローンとの接続を管理</p>
        </div>
        <div class="card-body">
            <div class="grid gap-4">
                <button id="connect-btn" class="btn btn-primary btn-lg">
                    <i class="fas fa-wifi"></i>
                    ドローンに接続
                </button>
                <button id="disconnect-btn" class="btn btn-secondary btn-lg" disabled>
                    <i class="fas fa-times"></i>
                    接続を切断
                </button>
            </div>
        </div>
    </div>
    
    <!-- 接続状態 -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">接続状態</h3>
            <p class="card-subtitle">現在の接続情報</p>
        </div>
        <div class="card-body">
            <div id="connection-info" class="space-y-3">
                <div class="flex justify-between">
                    <span>接続状態:</span>
                    <span id="connection-status" class="text-error">未接続</span>
                </div>
                <div class="flex justify-between">
                    <span>ドローンIP:</span>
                    <span id="drone-ip" class="font-mono">--</span>
                </div>
                <div class="flex justify-between">
                    <span>接続時間:</span>
                    <span id="connection-duration">--</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
