<div class="page-header">
    <h1 class="page-title">センサー監視</h1>
    <p class="page-description">ドローンの各種センサーデータをリアルタイム監視</p>
</div>

<!-- Main Sensor Cards -->
<div class="sensor-grid">
    <div class="sensor-card">
        <div class="sensor-header">
            <h3 class="sensor-title">🔋 バッテリー</h3>
        </div>
        <div class="sensor-value" id="battery-percent">--%</div>
        <div class="progress">
            <div id="battery-progress" class="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <div class="sensor-card">
        <div class="sensor-header">
            <h3 class="sensor-title">📏 高度</h3>
        </div>
        <div class="sensor-value" id="altitude-value">--cm</div>
        <div class="sensor-unit">地上からの高さ</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-header">
            <h3 class="sensor-title">🌡️ 温度</h3>
        </div>
        <div class="sensor-value" id="temperature-value">--°C</div>
        <div class="sensor-unit">ドローン内部温度</div>
    </div>

    <div class="sensor-card">
        <div class="sensor-header">
            <h3 class="sensor-title">⏱️ 飛行時間</h3>
        </div>
        <div class="sensor-value" id="flight-time-value">--秒</div>
        <div class="sensor-unit">累積飛行時間</div>
    </div>
</div>

<!-- Detailed Sensor Data -->
<div class="sensor-details">
    <!-- Attitude/Orientation -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">姿勢・方向</h2>
        </div>
        
        <div class="attitude-display">
            <div class="attitude-item">
                <div class="attitude-label">ピッチ (Pitch)</div>
                <div class="attitude-value" id="pitch-value">0°</div>
                <div class="attitude-bar">
                    <div id="pitch-indicator" class="attitude-indicator"></div>
                </div>
            </div>
            
            <div class="attitude-item">
                <div class="attitude-label">ロール (Roll)</div>
                <div class="attitude-value" id="roll-value">0°</div>
                <div class="attitude-bar">
                    <div id="roll-indicator" class="attitude-indicator"></div>
                </div>
            </div>
            
            <div class="attitude-item">
                <div class="attitude-label">ヨー (Yaw)</div>
                <div class="attitude-value" id="yaw-value">0°</div>
                <div class="attitude-bar">
                    <div id="yaw-indicator" class="attitude-indicator"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Motion Data -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">運動データ</h2>
        </div>
        
        <div class="motion-grid">
            <div class="motion-section">
                <h4>速度 (cm/s)</h4>
                <div class="motion-values">
                    <div class="motion-item">
                        <span class="motion-label">X:</span>
                        <span id="velocity-x" class="motion-value">0</span>
                    </div>
                    <div class="motion-item">
                        <span class="motion-label">Y:</span>
                        <span id="velocity-y" class="motion-value">0</span>
                    </div>
                    <div class="motion-item">
                        <span class="motion-label">Z:</span>
                        <span id="velocity-z" class="motion-value">0</span>
                    </div>
                </div>
            </div>
            
            <div class="motion-section">
                <h4>加速度 (g)</h4>
                <div class="motion-values">
                    <div class="motion-item">
                        <span class="motion-label">X:</span>
                        <span id="acceleration-x" class="motion-value">0.0</span>
                    </div>
                    <div class="motion-item">
                        <span class="motion-label">Y:</span>
                        <span id="acceleration-y" class="motion-value">0.0</span>
                    </div>
                    <div class="motion-item">
                        <span class="motion-label">Z:</span>
                        <span id="acceleration-z" class="motion-value">0.0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Environmental Data -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">環境データ</h2>
        </div>
        
        <div class="env-grid">
            <div class="env-item">
                <div class="env-label">気圧</div>
                <div class="env-value" id="barometer-value">-- hPa</div>
            </div>
            <div class="env-item">
                <div class="env-label">ToF距離</div>
                <div class="env-value" id="tof-distance">-- mm</div>
            </div>
        </div>
    </div>
</div>

<!-- Sensor Settings -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title">監視設定</h2>
    </div>
    
    <div class="sensor-settings">
        <div class="form-group">
            <label for="update-interval" class="form-label">更新間隔</label>
            <select id="update-interval" class="form-select">
                <option value="500">0.5秒</option>
                <option value="1000">1秒</option>
                <option value="2000" selected>2秒</option>
                <option value="5000">5秒</option>
            </select>
        </div>
        
        <div class="form-group">
            <label class="form-label">警告しきい値</label>
            <div class="threshold-settings">
                <div class="threshold-item">
                    <label for="battery-threshold">バッテリー低下:</label>
                    <input type="number" id="battery-threshold" value="20" min="10" max="50" class="form-input">
                    <span>%</span>
                </div>
                <div class="threshold-item">
                    <label for="temp-threshold">高温警告:</label>
                    <input type="number" id="temp-threshold" value="70" min="50" max="90" class="form-input">
                    <span>°C</span>
                </div>
            </div>
        </div>
    </div>
</div>
