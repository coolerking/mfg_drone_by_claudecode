<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追跡可視化 - MFG Drone 管理者画面</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tracking.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- ヘッダー -->
    <div class="header">
        <div class="container">
            <h1>📊 追跡結果可視化</h1>
            <p>追跡データの詳細分析と可視化表示</p>
        </div>
    </div>

    <div class="container">
        <!-- ナビゲーション -->
        <nav class="nav">
            <ul class="nav-links">
                <li><a href="/">ダッシュボード</a></li>
                <li><a href="/tracking/control">追跡制御</a></li>
                <li><a href="/tracking/monitor">状態監視</a></li>
                <li><a href="/tracking/visualization" class="active">追跡可視化</a></li>
            </ul>
        </nav>

        <!-- アラート表示エリア -->
        <div class="alert-container"></div>

        <!-- カメラストリーム with オーバーレイ -->
        <div class="detection-area">
            <h3>🎥 ライブストリーム with 検出結果</h3>
            <img id="streamVideo" class="detection-stream" src="/camera/stream" alt="ライブストリーム" 
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQwIiBoZWlnaHQ9IjQ4MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuOCueODiOODquODvOODoOOBjOWIqeeUqOOBp+OBjQ==</text></svg>'" />
            <div class="detection-overlay" id="detectionOverlay">
                <!-- 検出結果のオーバーレイ表示 -->
                <div id="centerCross" class="center-cross" style="display: none;"></div>
                <div id="targetBoundingBox" class="bounding-box" style="display: none;"></div>
                <div id="trajectoryPath" class="trajectory-path"></div>
            </div>
        </div>

        <!-- 追跡軌跡表示 -->
        <div class="trajectory-display">
            <h3>🗺️ 対象物移動軌跡</h3>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <button id="clearTrajectoryBtn" class="btn btn-warning">軌跡クリア</button>
                <button id="saveTrajectoryBtn" class="btn btn-success">軌跡保存</button>
                <label>
                    <input type="checkbox" id="showCenterLines" checked> 中央線表示
                </label>
                <label>
                    <input type="checkbox" id="showGrid" checked> グリッド表示
                </label>
            </div>
            <canvas id="trajectoryCanvas" class="trajectory-canvas"></canvas>
        </div>

        <!-- 詳細統計グラフ -->
        <div class="card">
            <h3>📈 追跡精度分析</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div>
                    <h4>位置偏差の時間変化</h4>
                    <canvas id="deviationChart" style="width: 100%; height: 300px;"></canvas>
                </div>
                <div>
                    <h4>検出信頼度分布</h4>
                    <canvas id="confidenceChart" style="width: 100%; height: 300px;"></canvas>
                </div>
            </div>
        </div>

        <!-- ヒートマップ -->
        <div class="card">
            <h3>🔥 追跡位置ヒートマップ</h3>
            <p>対象物が検出された位置の分布を表示</p>
            <canvas id="heatmapCanvas" style="width: 100%; height: 400px; border: 1px solid #ddd;"></canvas>
        </div>

        <!-- パフォーマンス指標 -->
        <div class="tracking-stats">
            <h3>⚡ パフォーマンス指標</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div id="avgResponseTime" class="stat-value">0ms</div>
                    <div class="stat-label">平均応答時間</div>
                </div>
                <div class="stat-item">
                    <div id="trackingAccuracy" class="stat-value">0%</div>
                    <div class="stat-label">追跡精度</div>
                </div>
                <div class="stat-item">
                    <div id="lostTargetCount" class="stat-value">0</div>
                    <div class="stat-label">ロスト回数</div>
                </div>
                <div class="stat-item">
                    <div id="maxDeviation" class="stat-value">0px</div>
                    <div class="stat-label">最大偏差</div>
                </div>
            </div>
        </div>

        <!-- データエクスポート -->
        <div class="card">
            <h3>💾 データエクスポート</h3>
            <p>追跡データを様々な形式でエクスポートできます</p>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button id="exportCsvBtn" class="btn btn-primary">CSV形式</button>
                <button id="exportJsonBtn" class="btn btn-success">JSON形式</button>
                <button id="exportImageBtn" class="btn btn-warning">軌跡画像</button>
                <button id="generateReportBtn" class="btn btn-info">レポート生成</button>
            </div>
        </div>
    </div>

    <style>
        /* 可視化専用スタイル */
        .center-cross {
            position: absolute;
            width: 20px;
            height: 20px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .center-cross::before,
        .center-cross::after {
            content: '';
            position: absolute;
            background: #ff416c;
        }

        .center-cross::before {
            width: 2px;
            height: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .center-cross::after {
            width: 20px;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .trajectory-path {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .trajectory-point {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #667eea;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .trajectory-line {
            position: absolute;
            height: 1px;
            background: #667eea;
            opacity: 0.6;
            transform-origin: left center;
        }
    </style>

    <script>
        // 可視化システムクラス
        class TrackingVisualization {
            constructor() {
                this.socket = null;
                this.trajectoryChart = null;
                this.deviationChart = null;
                this.confidenceChart = null;
                this.trajectoryPoints = [];
                this.deviationHistory = [];
                this.confidenceHistory = [];
                this.heatmapData = [];
                this.performanceMetrics = {
                    responseTimes: [],
                    lostCount: 0,
                    maxDeviation: 0
                };
                
                this.init();
            }
            
            init() {
                this.initializeSocket();
                this.initializeCharts();
                this.bindEvents();
                this.startVisualization();
                console.log('Tracking Visualization initialized');
            }
            
            initializeSocket() {
                this.socket = io();
                
                this.socket.on('connect', () => {
                    console.log('Visualization WebSocket connected');
                    this.showAlert('可視化システムに接続しました', 'success');
                });
                
                this.socket.on('tracking_status', (data) => {
                    this.updateVisualization(data);
                });
                
                this.socket.on('tracking_error', (data) => {
                    this.showAlert(`追跡エラー: ${data.message}`, 'danger');
                });
            }
            
            initializeCharts() {
                this.initializeTrajectoryCanvas();
                this.initializeDeviationChart();
                this.initializeConfidenceChart();
                this.initializeHeatmapCanvas();
            }
            
            initializeTrajectoryCanvas() {
                const canvas = document.getElementById('trajectoryCanvas');
                const ctx = canvas.getContext('2d');
                
                // キャンバスサイズ設定
                canvas.width = canvas.offsetWidth;
                canvas.height = 300;
                
                this.drawTrajectoryGrid(ctx, canvas.width, canvas.height);
            }
            
            initializeDeviationChart() {
                const ctx = document.getElementById('deviationChart').getContext('2d');
                this.deviationChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: '中央からの偏差 (px)',
                            data: [],
                            borderColor: '#ff416c',
                            backgroundColor: 'rgba(255, 65, 108, 0.1)',
                            tension: 0.1,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '偏差 (ピクセル)'
                                }
                            }
                        }
                    }
                });
            }
            
            initializeConfidenceChart() {
                const ctx = document.getElementById('confidenceChart').getContext('2d');
                this.confidenceChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['高信頼度', '中信頼度', '低信頼度'],
                        datasets: [{
                            data: [0, 0, 0],
                            backgroundColor: ['#28a745', '#ffc107', '#dc3545']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            }
            
            initializeHeatmapCanvas() {
                const canvas = document.getElementById('heatmapCanvas');
                canvas.width = canvas.offsetWidth;
                canvas.height = 400;
            }
            
            bindEvents() {
                // 軌跡クリア
                document.getElementById('clearTrajectoryBtn')?.addEventListener('click', () => {
                    this.clearTrajectory();
                });
                
                // 軌跡保存
                document.getElementById('saveTrajectoryBtn')?.addEventListener('click', () => {
                    this.saveTrajectory();
                });
                
                // 表示オプション
                document.getElementById('showCenterLines')?.addEventListener('change', (e) => {
                    this.toggleCenterLines(e.target.checked);
                });
                
                document.getElementById('showGrid')?.addEventListener('change', (e) => {
                    this.toggleGrid(e.target.checked);
                });
                
                // エクスポート
                document.getElementById('exportCsvBtn')?.addEventListener('click', () => {
                    this.exportCsv();
                });
                
                document.getElementById('exportJsonBtn')?.addEventListener('click', () => {
                    this.exportJson();
                });
                
                document.getElementById('exportImageBtn')?.addEventListener('click', () => {
                    this.exportTrajectoryImage();
                });
                
                document.getElementById('generateReportBtn')?.addEventListener('click', () => {
                    this.generateReport();
                });
            }
            
            updateVisualization(data) {
                // ストリームオーバーレイ更新
                this.updateStreamOverlay(data);
                
                // 軌跡データ更新
                if (data.target_position && data.target_detected) {
                    this.addTrajectoryPoint(data.target_position);
                }
                
                // 偏差データ更新
                this.updateDeviationData(data.target_position);
                
                // 信頼度データ更新（模擬データ）
                this.updateConfidenceData(data.target_detected);
                
                // ヒートマップ更新
                this.updateHeatmap(data.target_position);
                
                // パフォーマンス指標更新
                this.updatePerformanceMetrics(data);
            }
            
            updateStreamOverlay(data) {
                // 中央十字線表示
                const centerCross = document.getElementById('centerCross');
                if (centerCross) {
                    centerCross.style.display = 'block';
                }
                
                // バウンディングボックス表示
                const bbox = document.getElementById('targetBoundingBox');
                if (bbox && data.target_position && data.target_detected) {
                    const stream = document.getElementById('streamVideo');
                    const streamRect = stream.getBoundingClientRect();
                    
                    bbox.style.display = 'block';
                    bbox.style.left = data.target_position.x + 'px';
                    bbox.style.top = data.target_position.y + 'px';
                    bbox.style.width = data.target_position.width + 'px';
                    bbox.style.height = data.target_position.height + 'px';
                    bbox.className = `bounding-box ${data.target_detected ? 'detected' : ''}`;
                } else if (bbox) {
                    bbox.style.display = 'none';
                }
            }
            
            addTrajectoryPoint(position) {
                const timestamp = new Date();
                this.trajectoryPoints.push({
                    x: position.x,
                    y: position.y,
                    timestamp: timestamp
                });
                
                // 軌跡の長さ制限
                if (this.trajectoryPoints.length > 200) {
                    this.trajectoryPoints.shift();
                }
                
                this.drawTrajectory();
            }
            
            drawTrajectory() {
                const canvas = document.getElementById('trajectoryCanvas');
                const ctx = canvas.getContext('2d');
                
                // キャンバスクリア
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // グリッド描画
                if (document.getElementById('showGrid')?.checked) {
                    this.drawTrajectoryGrid(ctx, canvas.width, canvas.height);
                }
                
                // 中央線描画
                if (document.getElementById('showCenterLines')?.checked) {
                    this.drawCenterLines(ctx, canvas.width, canvas.height);
                }
                
                // 軌跡描画
                if (this.trajectoryPoints.length > 1) {
                    ctx.strokeStyle = '#667eea';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    
                    for (let i = 0; i < this.trajectoryPoints.length; i++) {
                        const point = this.trajectoryPoints[i];
                        const x = (point.x / 640) * canvas.width;
                        const y = (point.y / 480) * canvas.height;
                        
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                    
                    // 軌跡ポイント描画
                    this.trajectoryPoints.forEach((point, index) => {
                        const x = (point.x / 640) * canvas.width;
                        const y = (point.y / 480) * canvas.height;
                        const alpha = 0.3 + (index / this.trajectoryPoints.length) * 0.7;
                        
                        ctx.fillStyle = `rgba(102, 126, 234, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                }
            }
            
            drawTrajectoryGrid(ctx, width, height) {
                ctx.strokeStyle = '#e9ecef';
                ctx.lineWidth = 1;
                
                // 縦線
                for (let x = 0; x <= width; x += width / 10) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                
                // 横線
                for (let y = 0; y <= height; y += height / 10) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
            }
            
            drawCenterLines(ctx, width, height) {
                ctx.strokeStyle = '#ff416c';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                
                // 中央縦線
                ctx.beginPath();
                ctx.moveTo(width / 2, 0);
                ctx.lineTo(width / 2, height);
                ctx.stroke();
                
                // 中央横線
                ctx.beginPath();
                ctx.moveTo(0, height / 2);
                ctx.lineTo(width, height / 2);
                ctx.stroke();
                
                ctx.setLineDash([]);
            }
            
            updateDeviationData(position) {
                if (!position) return;
                
                const centerX = 320;
                const centerY = 240;
                const deviation = Math.sqrt(
                    Math.pow(position.x - centerX, 2) + 
                    Math.pow(position.y - centerY, 2)
                );
                
                const timestamp = new Date().toLocaleTimeString();
                this.deviationHistory.push({
                    time: timestamp,
                    deviation: deviation
                });
                
                // 履歴の長さ制限
                if (this.deviationHistory.length > 50) {
                    this.deviationHistory.shift();
                }
                
                // グラフ更新
                const labels = this.deviationHistory.map(d => d.time);
                const data = this.deviationHistory.map(d => d.deviation);
                
                this.deviationChart.data.labels = labels;
                this.deviationChart.data.datasets[0].data = data;
                this.deviationChart.update('none');
                
                // 最大偏差更新
                const maxDev = Math.max(...data);
                if (maxDev > this.performanceMetrics.maxDeviation) {
                    this.performanceMetrics.maxDeviation = maxDev;
                    document.getElementById('maxDeviation').textContent = `${Math.round(maxDev)}px`;
                }
            }
            
            updateConfidenceData(detected) {
                // 模擬信頼度データ
                const confidence = detected ? (0.8 + Math.random() * 0.2) : (Math.random() * 0.3);
                
                this.confidenceHistory.push(confidence);
                if (this.confidenceHistory.length > 100) {
                    this.confidenceHistory.shift();
                }
                
                // 信頼度分布計算
                const high = this.confidenceHistory.filter(c => c > 0.7).length;
                const medium = this.confidenceHistory.filter(c => c > 0.4 && c <= 0.7).length;
                const low = this.confidenceHistory.filter(c => c <= 0.4).length;
                
                this.confidenceChart.data.datasets[0].data = [high, medium, low];
                this.confidenceChart.update('none');
            }
            
            updateHeatmap(position) {
                if (!position) return;
                
                // ヒートマップデータに位置を追加
                this.heatmapData.push({
                    x: position.x,
                    y: position.y,
                    intensity: 1
                });
                
                // データ制限
                if (this.heatmapData.length > 1000) {
                    this.heatmapData.shift();
                }
                
                this.drawHeatmap();
            }
            
            drawHeatmap() {
                const canvas = document.getElementById('heatmapCanvas');
                const ctx = canvas.getContext('2d');
                
                // キャンバスクリア
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // ヒートマップ描画（簡易版）
                this.heatmapData.forEach(point => {
                    const x = (point.x / 640) * canvas.width;
                    const y = (point.y / 480) * canvas.height;
                    
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
                    gradient.addColorStop(0, 'rgba(255, 65, 108, 0.5)');
                    gradient.addColorStop(1, 'rgba(255, 65, 108, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(x, y, 20, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
            
            updatePerformanceMetrics(data) {
                // 模擬パフォーマンスデータ
                const responseTime = 50 + Math.random() * 100;
                this.performanceMetrics.responseTimes.push(responseTime);
                
                if (this.performanceMetrics.responseTimes.length > 100) {
                    this.performanceMetrics.responseTimes.shift();
                }
                
                // 平均応答時間
                const avgResponseTime = this.performanceMetrics.responseTimes.reduce((a, b) => a + b, 0) / this.performanceMetrics.responseTimes.length;
                document.getElementById('avgResponseTime').textContent = `${Math.round(avgResponseTime)}ms`;
                
                // 追跡精度（模擬）
                const accuracy = data.target_detected ? 95 + Math.random() * 5 : 60 + Math.random() * 20;
                document.getElementById('trackingAccuracy').textContent = `${Math.round(accuracy)}%`;
            }
            
            clearTrajectory() {
                this.trajectoryPoints = [];
                this.drawTrajectory();
                this.showAlert('軌跡をクリアしました', 'success');
            }
            
            saveTrajectory() {
                const data = {
                    timestamp: new Date().toISOString(),
                    trajectoryPoints: this.trajectoryPoints,
                    totalPoints: this.trajectoryPoints.length
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `trajectory_${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.showAlert('軌跡データを保存しました', 'success');
            }
            
            toggleCenterLines(show) {
                this.drawTrajectory();
            }
            
            toggleGrid(show) {
                this.drawTrajectory();
            }
            
            exportCsv() {
                let csv = 'Timestamp,X,Y,Deviation\n';
                this.trajectoryPoints.forEach(point => {
                    const centerX = 320, centerY = 240;
                    const deviation = Math.sqrt(Math.pow(point.x - centerX, 2) + Math.pow(point.y - centerY, 2));
                    csv += `${point.timestamp.toISOString()},${point.x},${point.y},${deviation}\n`;
                });
                
                this.downloadFile(csv, 'tracking_data.csv', 'text/csv');
                this.showAlert('CSVファイルをエクスポートしました', 'success');
            }
            
            exportJson() {
                const data = {
                    trajectoryPoints: this.trajectoryPoints,
                    deviationHistory: this.deviationHistory,
                    performanceMetrics: this.performanceMetrics,
                    exportTime: new Date().toISOString()
                };
                
                this.downloadFile(JSON.stringify(data, null, 2), 'tracking_data.json', 'application/json');
                this.showAlert('JSONファイルをエクスポートしました', 'success');
            }
            
            exportTrajectoryImage() {
                const canvas = document.getElementById('trajectoryCanvas');
                const url = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = `trajectory_${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                this.showAlert('軌跡画像をエクスポートしました', 'success');
            }
            
            generateReport() {
                // 簡易レポート生成
                const report = {
                    title: 'MFG Drone 追跡レポート',
                    generatedAt: new Date().toISOString(),
                    summary: {
                        totalTrackingPoints: this.trajectoryPoints.length,
                        averageDeviation: this.deviationHistory.length > 0 ? 
                            this.deviationHistory.reduce((a, b) => a + b.deviation, 0) / this.deviationHistory.length : 0,
                        maxDeviation: this.performanceMetrics.maxDeviation,
                        trackingDuration: this.trajectoryPoints.length > 0 ? 
                            new Date(this.trajectoryPoints[this.trajectoryPoints.length - 1].timestamp) - new Date(this.trajectoryPoints[0].timestamp) : 0
                    },
                    data: {
                        trajectoryPoints: this.trajectoryPoints,
                        deviationHistory: this.deviationHistory,
                        performanceMetrics: this.performanceMetrics
                    }
                };
                
                this.downloadFile(JSON.stringify(report, null, 2), 'tracking_report.json', 'application/json');
                this.showAlert('追跡レポートを生成しました', 'success');
            }
            
            downloadFile(content, filename, type) {
                const blob = new Blob([content], { type: type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
            
            showAlert(message, type = 'info') {
                const container = document.querySelector('.alert-container');
                if (!container) return;
                
                const alert = document.createElement('div');
                alert.className = `alert alert-${type} fade-in`;
                alert.textContent = message;
                container.appendChild(alert);
                
                setTimeout(() => {
                    if (alert.parentNode) {
                        alert.remove();
                    }
                }, 3000);
            }
            
            startVisualization() {
                // 定期的な状態監視
                setInterval(() => {
                    this.socket.emit('request_tracking_status');
                }, 1000);
            }
        }
        
        // ページ読み込み時に初期化
        document.addEventListener('DOMContentLoaded', () => {
            window.trackingVisualization = new TrackingVisualization();
        });
    </script>
</body>
</html>
