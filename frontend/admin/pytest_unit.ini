[tool:pytest]
# 単体テスト専用設定
# Test discovery - 単体テストのみ実行
testpaths = tests
python_files = test_drone_api_client*.py test_flask_routes*.py
python_classes = Test*
python_functions = test_*

# Test execution options for unit tests
addopts = 
    --strict-markers
    --tb=short
    --cov=main
    --cov-report=html:tests/reports/coverage_html
    --cov-report=term-missing
    --cov-report=json:tests/reports/coverage.json
    --cov-fail-under=85
    --html=tests/reports/unit_test_report.html
    --self-contained-html
    --json-report
    --json-report-file=tests/reports/unit_test_report.json
    -v

# Custom markers for unit test categorization
markers =
    unit: Unit tests for functions and classes
    integration: Integration tests between components
    mock: Tests using mock objects
    edge_case: Edge case and boundary value tests
    error_handling: Error handling and exception tests
    api_client: DroneAPIClient class tests
    flask_routes: Flask route handler tests
    timeout: Tests that may take longer due to timeout scenarios

# Coverage configuration
# メインモジュールのカバレッジを測定
cov-source = .
cov-include = main.py

# Test timeouts
timeout = 60
timeout_method = thread

# Logging configuration for unit tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filtering and collection
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::requests.packages.urllib3.exceptions.InsecureRequestWarning

# Minimum version requirements
minversion = 7.0