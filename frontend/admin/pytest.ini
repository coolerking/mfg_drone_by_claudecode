[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --html=tests/reports/report.html
    --self-contained-html
    -v
markers =
    unit: 単体テスト
    integration: 結合テスト  
    mock_backend: モックバックエンドテスト
    real_backend: 実機バックエンドテスト
    ui: UIテスト
    slow: 実行時間の長いテスト
    requires_hardware: 実機が必要なテスト