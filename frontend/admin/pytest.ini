[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --cov=.
    --cov-report=html:tests/reports/coverage
    --cov-report=term-missing
    --cov-report=xml:tests/reports/coverage.xml
    --html=tests/reports/report.html
    --self-contained-html
    -v
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
markers =
    unit: 単体テスト
    integration: 結合テスト
    mock_backend: モックバックエンド結合テスト
    real_backend: 実機バックエンド結合テスト
    websocket: WebSocket通信テスト
    file_upload: ファイルアップロードテスト
    api_integration: API統合テスト
    slow: 実行時間の長いテスト
    requires_hardware: 実機が必要なテスト
    requires_backend: バックエンドサーバーが必要なテスト